  :root {

    --bg: #f0f4f8;
    --card: #ffffff;
    --text: #1e293b;
    --muted: #64748b;
    --border: #e2e8f0;
    --green: #16a34a;
    --yellow: #ca8a04;
    --red: #dc2626;
    --purple: #7c3aed;
    --teal: #0891b2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  .header { background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%); padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { color: #fff; font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  .header .sub { color: var(--light-blue); font-size: 13px; margin-top: 2px; }
  .header .date { color: var(--light-blue); font-size: 12px; text-align: right; }

  /* STATS BAR */
  .stats-bar { display: flex; gap: 16px; padding: 20px 32px; background: var(--navy); border-top: 1px solid rgba(255,255,255,0.08); }
  .stat { text-align: center; }
  .stat .n { font-size: 24px; font-weight: 700; color: #fff; }
  .stat .l { font-size: 11px; color: var(--light-blue); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
  .stat-divider { width: 1px; background: rgba(255,255,255,0.12); margin: 0 8px; }

  /* LAYOUT */
  .main { padding: 24px 32px; max-width: 1400px; }

  /* FILTER BAR */
  .filter-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--card); color: var(--muted); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover, .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .search-input { margin-left: auto; padding: 7px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; width: 220px; outline: none; }
  .search-input:focus { border-color: var(--accent); }

  /* LEAD CARDS */
  .leads-grid { display: flex; flex-direction: column; gap: 12px; }
  .lead-card { background: var(--card); border-radius: 12px; border: 1.5px solid var(--border); overflow: hidden; transition: box-shadow 0.15s; }
  .lead-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }

  .lead-header { display: flex; align-items: center; padding: 16px 20px; gap: 14px; cursor: pointer; }
  .company-avatar { width: 42px; height: 42px; border-radius: 10px; background: var(--navy); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: var(--light-blue); flex-shrink: 0; }
  .lead-meta { flex: 1; min-width: 0; }
  .lead-name { font-size: 15px; font-weight: 700; color: var(--text); }
  .lead-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .lead-badges { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
  .badge-active { background: #dcfce7; color: var(--green); }
  .badge-build { background: #dbeafe; color: #1d4ed8; }
  .badge-outreach { background: #fef3c7; color: var(--yellow); }
  .badge-pending { background: #f1f5f9; color: var(--muted); }
  .badge-waiting { background: #ede9fe; color: var(--purple); }
  .badge-reference { background: #f0f9ff; color: var(--teal); }
  .badge-hot { background: #fee2e2; color: var(--red); }
  .trigger-chip { background: #eff6ff; color: var(--accent); border: 1px solid #bfdbfe; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .expand-btn { color: var(--muted); font-size: 18px; cursor: pointer; padding: 4px; flex-shrink: 0; transition: transform 0.2s; }
  .expand-btn.open { transform: rotate(180deg); }

  /* LEAD BODY */
  .lead-body { display: none; border-top: 1px solid var(--border); }
  .lead-body.open { display: block; }
  .lead-body-inner { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0; }
  .lead-section { padding: 16px 20px; border-right: 1px solid var(--border); }
  .lead-section:last-child { border-right: none; }
  .section-title { font-size: 10px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  .field { margin-bottom: 10px; }
  .field-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; }
  .field-value { font-size: 13px; color: var(--text); line-height: 1.5; }
  .field-value a { color: var(--accent); text-decoration: none; }
  .field-value a:hover { text-decoration: underline; }

  /* ACTION BUTTONS */
  .action-row { padding: 12px 20px; border-top: 1px solid var(--border); background: #f8fafc; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .action-btn { padding: 7px 14px; border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; transition: opacity 0.15s; }
  .action-btn:hover { opacity: 0.85; }
  .btn-iris { background: #7c3aed; color: #fff; }
  .btn-vince { background: #0891b2; color: #fff; }
  .btn-otto { background: #0a1628; color: #fff; }
  .btn-asset { background: #16a34a; color: #fff; }
  .btn-email { background: var(--accent); color: #fff; }
  .btn-bo { background: #1a3a6b; color: #fff; }
  .btn-scribe { background: #b45309; color: #fff; }

  /* TEAM QUICK ACCESS */
  .team-bar { background: var(--navy); padding: 10px 32px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; border-top: 1px solid rgba(255,255,255,0.08); }
  .team-bar-label { color: var(--light-blue); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-right: 4px; }
  .team-btn { padding: 6px 14px; border-radius: 7px; font-size: 12px; font-weight: 600; color: #fff; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; transition: opacity 0.15s; }
  .team-btn:hover { opacity: 0.8; }
  .next-action { margin-left: auto; font-size: 12px; color: var(--muted); font-style: italic; }

  /* STATUS EDITOR */
  .status-editor { display: flex; align-items: center; gap: 8px; margin-left: auto; flex-wrap: wrap; }
  .status-select { padding: 6px 10px; border-radius: 7px; border: 1.5px solid var(--border); font-size: 12px; font-weight: 600; color: var(--text); background: #fff; cursor: pointer; outline: none; }
  .status-select:focus { border-color: var(--accent); }
  .date-input { padding: 6px 10px; border-radius: 7px; border: 1.5px solid var(--border); font-size: 12px; color: var(--text); background: #fff; outline: none; }
  .date-input:focus { border-color: var(--accent); }
  .save-btn { padding: 6px 12px; border-radius: 7px; background: var(--accent); color: #fff; font-size: 12px; font-weight: 700; border: none; cursor: pointer; }
  .save-btn:hover { opacity: 0.85; }
  .saved-flash { font-size: 11px; color: var(--green); font-weight: 700; display: none; }

  /* EMPTY */
  .empty { text-align: center; padding: 48px; color: var(--muted); font-size: 14px; }

  @media (max-width: 900px) {
    .lead-body-inner { grid-template-columns: 1fr; }
    .lead-section { border-right: none; border-bottom: 1px solid var(--border); }
    .stats-bar { flex-wrap: wrap; }
    .main { padding: 16px; }
    .header { padding: 16px; }
  }
</style>

const statusBadge = {
  "Asset in Build": "badge-build",
  "Outreach Sent": "badge-active",
  "Waiting on Reply": "badge-waiting",
  "Researching": "badge-outreach",
  "Assigned": "badge-pending",
  "Reference": "badge-reference",
  "Warm Relationship": "badge-hot"
};

function renderStats() {
  const counts = {};
  leads.forEach(l => { counts[l.status] = (counts[l.status] || 0) + 1; });
  const hot = leads.filter(l => l.hot).length;
  const bar = document.getElementById('statsBar');
  const items = [
    { n: leads.length, l: 'Total Leads' },
    { n: hot, l: '🔥 Hot' },
    { n: counts['Outreach Sent'] || 0, l: 'Outreach Sent' },
    { n: counts['Waiting on Reply'] || 0, l: 'Waiting Reply' },
    { n: counts['Asset in Build'] || 0, l: 'Asset Building' },
    { n: (counts['Assigned'] || 0) + (counts['Researching'] || 0), l: 'In Queue' }
  ];
  bar.innerHTML = items.map((item, i) =>
    `${i > 0 ? '<div class="stat-divider"></div>' : ''}<div class="stat"><div class="n">${item.n}</div><div class="l">${item.l}</div></div>`
  ).join('');
}

function renderAssets(assets) {
  if (!assets || assets.length === 0) return '<span style="color:var(--muted);font-size:13px;">None yet</span>';
  return assets.map(a =>
    `<div style="margin-bottom:6px;"><span style="font-size:13px;">${a.link ? `<a href="${a.link}" target="_blank">📎 ${a.name}</a>` : `📎 ${a.name}`}</span> <span style="font-size:11px;color:var(--muted);">(${a.status})</span></div>`
  ).join('');
}

function renderCard(lead) {
  const badge = statusBadge[lead.status] || 'badge-pending';
  const safeId = lead.company.replace(/[^a-zA-Z0-9]/g,'-');
  return `
  <div class="lead-card" id="card-${lead.company.replace(/\s+/g,'-')}">
    <div class="lead-header" onclick="toggleCard(this)">
      <div class="company-avatar">${lead.initials}</div>
      <div class="lead-meta">
        <div class="lead-name">${lead.company}${lead.hot ? ' 🔥' : ''}</div>
        <div class="lead-sub">${lead.industry} · ${lead.revenue}</div>
      </div>
      <div class="lead-badges">
        <span class="badge ${badge}">${lead.status}</span>
        <span class="trigger-chip">⚡ ${lead.trigger.substring(0, 55)}${lead.trigger.length > 55 ? '…' : ''}</span>

      <div class="expand-btn">▾</div>
    </div>

          <div class="field"><div class="field-label">Email</div><div class="field-value"><a href="mailto:${lead.contactEmail}">${lead.contactEmail}</a></div></div>

          <div class="field"><div class="field-label">Trigger</div><div class="field-value">${lead.trigger}</div></div>
          <div class="field"><div class="field-label">Angle / Hook</div><div class="field-value">${lead.angle}</div></div>
          <div class="field"><div class="field-label">Outreach Status</div><div class="field-value">${lead.outreach}</div></div>
          <div class="field"><div class="field-label">Notes</div><div class="field-value" style="color:var(--muted);">${lead.notes}</div></div>
        </div>
        <div class="lead-section">
          <div class="section-title">Assets & Next Move</div>
          <div class="field"><div class="field-label">Assets Built</div><div class="field-value">${renderAssets(lead.assets)}</div></div>

        </div>
      </div>

        <a class="action-btn btn-iris" href="${lead.discordIris}" target="_blank">🔬 Iris</a>
        <a class="action-btn btn-vince" href="${lead.discordVince}" target="_blank">📬 Vince</a>

          <select class="status-select" id="status-${safeId}" onchange="statusChanged('${safeId}')">

function toggleCard(header) {
  const body = header.nextElementSibling;
  const btn = header.querySelector('.expand-btn');
  body.classList.toggle('open');
  btn.classList.toggle('open');
}

function statusChanged(safeId) {
  // auto-set today's date if blank
  const dateEl = document.getElementById('date-' + safeId);
  if (!dateEl.value) {
    const today = new Date().toISOString().split('T')[0];
    dateEl.value = today;
  }
}

function saveStatus(safeId, company) {
  const sel = document.getElementById('status-' + safeId);
  const dateEl = document.getElementById('date-' + safeId);
  const flash = document.getElementById('flash-' + safeId);
  const newStatus = sel.value;
  const newDate = dateEl.value;

  // Save to localStorage
  const key = 'lead-status-' + safeId;
  localStorage.setItem(key, JSON.stringify({status: newStatus, date: newDate}));

  // Update badge in header
  const card = document.getElementById('card-' + safeId);
  if (card) {
    const badgeEl = card.querySelector('.badge');
    const badgeClass = statusBadge[newStatus] || 'badge-pending';
    if (badgeEl) {
      badgeEl.className = 'badge ' + badgeClass;
      badgeEl.textContent = newStatus;
    }
  }

  // Flash saved
  flash.style.display = 'inline';
  setTimeout(() => flash.style.display = 'none', 2000);
}

function loadSavedStatuses() {
  leads.forEach(lead => {
    const safeId = lead.company.replace(/[^a-zA-Z0-9]/g,'-');
    const saved = localStorage.getItem('lead-status-' + safeId);
    if (saved) {
      try {
        const data = JSON.parse(saved);
        if (data.status) lead.status = data.status;
        if (data.date) lead.outreachDate = data.date;
      } catch(e) {}
    }
  });
}

let currentFilter = 'all';

function renderAll(filterStatus, search) {
  const grid = document.getElementById('leadsGrid');
  let filtered = leads;
  if (filterStatus && filterStatus !== 'all') filtered = filtered.filter(l => l.status === filterStatus);
  if (search) {
    const q = search.toLowerCase();
    filtered = filtered.filter(l =>
      l.company.toLowerCase().includes(q) ||
      l.contact.toLowerCase().includes(q) ||
      l.trigger.toLowerCase().includes(q) ||
      l.industry.toLowerCase().includes(q)
    );
  }
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">No leads match your filter.</div>';
  } else {
    grid.innerHTML = filtered.map(renderCard).join('');
  }
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderAll(currentFilter, document.getElementById('searchInput').value);
  });
});

document.getElementById('searchInput').addEventListener('input', e => {
  renderAll(currentFilter, e.target.value);
});

// Date
const now = new Date();
document.getElementById('headerDate').innerHTML =
  `${now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}<br><span style="font-size:11px;">Last updated by Bo</span>`;

loadSavedStatuses();
renderStats();
renderAll('all', '');
